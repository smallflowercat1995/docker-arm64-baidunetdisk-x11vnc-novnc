version: "3.9"
services:
  baidunetdisk-app:
    build: .
    image: smallflowercat1995/debian-baidunetdisk:latest
    container_name: debian-baidunetdisk-latest-container
    restart: always
    ports:
      - "5902:5903"
      - "36080:36081"
    env_file:
      - environment.env
    volumes:
      - ../docker-container/baidunetdisk/baidunetdiskdownload:/baidunetdiskdownload:rw
